version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: claimpilot-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: claimpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: claimpilot-backend
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/claimpilot
      - JWT_ACCESS_SECRET=claimpilot_access_secret_key_2024_change_in_production
      - JWT_REFRESH_SECRET=claimpilot_refresh_secret_key_2024_change_in_production
      - FRONTEND_URL=http://localhost:3000
      - UPLOAD_DIR=./uploads
      - OCR_LANG=eng
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run prisma:migrate && npm run dev"

volumes:
  postgres_data:
